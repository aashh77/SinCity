<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SINCITY INVESTIGATOR | NEON NOIR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col p-6 gap-6">
    <div class="siren-overlay"></div>

    <div id="briefing-screen" class="fixed inset-0 z-[2000] bg-slate-950 flex items-center justify-center p-6">
        <div class="max-w-lg w-full neon-box p-12 text-center border-b-8 border-cyan-500">
            <h1 class="font-['Syncopate'] text-2xl text-cyan-400 mb-6">TERMINAL_INIT</h1>
            <input type="text" id="user-name-input" placeholder="DET. SURNAME" class="w-full bg-slate-900 border-2 border-cyan-900 p-4 text-white mb-8 text-center text-xl outline-none uppercase">
            <button onclick="UI.startInvestigation()" class="w-full py-5 bg-cyan-600 text-white font-black uppercase tracking-widest hover:bg-cyan-400">Enter SinCity</button>
        </div>
    </div>

    <header class="neon-box p-6 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-6">
            <div class="w-14 h-14 rounded-full border-2 border-cyan-500 flex items-center justify-center text-2xl bg-cyan-950/30">👤</div>
            <div>
                <h1 id="display-name" class="font-['Syncopate'] text-white">Det. Unknown</h1>
                <p class="text-xs text-cyan-700 font-bold uppercase">Precinct 07 // Homicide</p>
            </div>
        </div>
        <div class="text-right flex items-center gap-10">
            <div>
                <p id="time-display" class="text-4xl font-black text-cyan-400">24:00</p>
                <p class="text-[10px] text-slate-500 font-bold uppercase">Investigation Window</p>
            </div>
            <button onclick="UI.toggleAccusation()" class="bg-red-600 px-8 py-4 rounded-xl font-bold uppercase text-xs text-white hover:bg-red-500 transition-all">Submit Arrest Warrant</button>
        </div>
    </header>

    <main class="flex-grow flex gap-6 min-h-0">
        <aside class="w-1/4 neon-box p-6 flex flex-col min-h-0">
            <h2 class="text-xs text-slate-500 font-bold mb-4 uppercase border-b border-slate-800 pb-2">Subject Profiles</h2>
            <div id="character-panel" class="space-y-3 overflow-y-auto pr-2"></div>
        </aside>

        <section class="flex-grow flex flex-col gap-6 min-w-0">
            <div id="game-log" class="flex-grow bg-slate-950/40 rounded-[2rem] p-8 overflow-y-auto border border-white/5 text-lg leading-relaxed"></div>
            <div class="neon-box p-2 flex items-center gap-4 shrink-0 border-2 border-cyan-900/30">
                <input type="text" id="player-input" placeholder="TALK TO [NAME]: Your message..." class="flex-grow bg-transparent p-4 outline-none uppercase text-sm tracking-widest text-white">
                <button onclick="GameState.handleInput()" class="bg-cyan-600 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs">Send</button>
            </div>
        </section>

        <aside class="w-1/4 flex flex-col gap-6 min-h-0">
            <div class="neon-box p-6 flex-grow flex flex-col overflow-hidden">
                <h2 class="text-xs text-slate-500 font-bold mb-4 uppercase">Crime Scene Map</h2>
                <div class="flex-grow bg-black/40 rounded-2xl flex items-center justify-center">
                    <svg viewBox="0 0 240 240" id="casino-map" class="w-full h-auto p-4"></svg>
                </div>
            </div>
            <div class="neon-box h-72 p-6 flex flex-col shrink-0">
                <h2 class="text-xs text-gold font-bold mb-4 uppercase">Evidence Locker</h2>
                <div id="evidence-list" class="flex flex-col gap-2 overflow-y-auto pr-2"></div>
            </div>
        </aside>
    </main>

    <div id="accuse-modal" class="hidden fixed inset-0 z-[3000] bg-black/98 flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="neon-box max-w-lg w-full p-12 rounded-[3rem] border-red-600 border-4">
            <h2 class="font-['Syncopate'] text-red-600 text-2xl mb-8">VERIFY IDENTITY</h2>
            <p class="text-xs text-slate-400 mb-4">Select the person who matches the Oakhaven Fingerprints:</p>
            <select id="arrest-select" class="w-full bg-slate-900 border-2 border-red-900 p-4 text-white mb-8 rounded-xl uppercase font-bold text-xs"></select>
            <button onclick="GameState.submitFinalTheory()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl uppercase tracking-widest">Authorize Arrest</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
